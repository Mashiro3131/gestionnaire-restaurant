<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iko's - Restaurant</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-ikos sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">
            <img src="{{ url_for('static', filename='img/iko-logo-black.svg') }}" 
                 alt="Ikos Logo" 
                 height="55"
                 class="d-inline-block align-top">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <div class="navbar-nav">
                <a class="nav-link-ikos mx-3" href="/">Home</a>
                <a class="nav-link-ikos mx-3" href="#menu">Menu</a>
                <a class="nav-link-ikos mx-3" href="/order">Order</a>
                <a class="nav-link-ikos mx-3" href="/contact">Contact</a>
                <!--- <a class="nav-link-ikos mx-3 text-primary" href="/admin">Admin</a> --->
            </div>
        </div>

        <div class="d-flex align-items-center">
            <a href="/login" class="me-3">
                <img src="{{ url_for('static', filename='img/account-logo-black.svg') }}"
                     alt="Account"
                     width="24" 
                     height="24"> 
            </a>
            <div class="position-relative">
                <a href="/cart" class="text-decoration-none">
                    <img src="{{ url_for('static', filename='img/shooping-cart-black.svg') }}"
                         alt="Shopping cart"
                         width="24" 
                         height="24">
                    <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle">0</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
